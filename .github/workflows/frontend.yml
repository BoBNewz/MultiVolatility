name: Frontend CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    build-and-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Web

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: Web/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint code
              run: npm run lint

            - name: Build frontend
              run: npm run build
